<!DOCTYPE html>
<html lang="en" style="background: transparent;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DB+ | Expert Architecture Services in Corby & 20-Mile Radius</title>

      content="Full-service architecture studio in Corby covering a 20-mile radius. BIM-led design, planning applications, extensions, and new builds. Serving Kettering, Market Harborough, Stamford, Oundle, Weldon, and Gretton."
    />
    <!-- Note: the keywords meta tag has low SEO value; keep concise if used -->
    <meta
      name="keywords"
      content="Architect Corby, Architect Kettering, BIM Design UK, Planning Permission Corby, House Extensions Market Harborough, Stamford Architect, New Build Design Oundle, MEP Services Gretton, Wellingborough Architect, Oundle Architect"
    />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="DB+ | Expert Architecture Services in Corby & 20-Mile Radius" />
    <meta property="og:description" content="Full-service architecture studio delivering concept to completion through BIM technology. Planning, design, and structural pre-design." />
    <meta property="og:url" content="https://dbsdesigner.com" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- JSON-LD for Local Business SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "DB+ Design & Management",
      "url": "https://dbsdesigner.com",
      "telephone": "+44 7955 018937",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "108 Kestrel Road",
        "addressLocality": "Corby",
        "addressRegion": "Northamptonshire",
        "postalCode": "NN18",
        "addressCountry": "GB"
      },
      "areaServed": [
        "Corby", "Kettering", "Wellingborough", "Market Harborough", "Oundle", "Thrapston",
        "Uppingham", "Stamford", "Rushden", "Desborough", "Rothwell", "Weldon", "Gretton"
      ],
      "description": "Full-service architecture practice delivering projects from concept to completion using BIM."
    }
    </script>

    <!-- Critical minimal styles; Tailwind & app CSS are bundled by Vite -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        font-family: Arial, Helvetica, sans-serif;
        color: #000000;
        overflow-x: hidden;
        cursor: none;
      }
      a, button, input, select, textarea, [role="button"], .cursor-pointer {
        cursor: none !important;
      }
      #custom-cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 10px;
        height: 10px;
        background-color: #333333;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transition: transform 0.1s ease-out, opacity 0.3s ease, background-color 0.3s ease;
        transform: translate(-50%, -50%);
        will-change: transform, top, left;
      }
      #custom-cursor.active {
        background-color: #ff0000;
        transform: translate(-50%, -50%) scale(3);
      }
      @media (hover: none) and (pointer: coarse) {
        body { cursor: auto; background-color: #ffffff !important; }
        a, button, input, select, textarea, [role="button"], .cursor-pointer { cursor: pointer !important; }
        #custom-cursor { display: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        #custom-cursor { transition: none; }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="custom-cursor"></div>

    <!-- Custom cursor script -->
    <script>
      const cursor = document.getElementById("custom-cursor");
      if (cursor) {
        window.addEventListener("mousemove", (e) => {
          cursor.style.top = e.clientY + "px";
          cursor.style.left = e.clientX + "px";
          const target = e.target;
          const isInteractive = target.closest('button, a, input, textarea, select, .cursor-pointer');
          if (isInteractive) {
            cursor.classList.add('active');
          } else {
            cursor.classList.remove('active');
          }
        });
        window.addEventListener("mousedown", () => cursor.classList.add("active"));
        window.addEventListener("mouseup", () => cursor.classList.remove("active"));
        window.addEventListener("mouseleave", () => { cursor.style.opacity = "0"; });
        window.addEventListener("mouseenter", () => { cursor.style.opacity = "1"; });
      }
    </script>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
