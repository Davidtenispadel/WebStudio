<!DOCTYPE html>
<html lang="en" style="background: transparent;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Architect in Corby | DB+ Architecture Practice</title>

    <meta name="description" content="Architectural practice in Corby specialising in extensions, planning applications, new builds and BIM-led design." />

    <meta property="og:title" content="DB+ Architecture Practice" />
    <meta property="og:description" content="Architectural practice delivering planning drawings, extensions, new builds and BIM-led design." />
    <meta property="og:url" content="https://dbsdesigner.com" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />

    <link rel="icon" type="image/png" href="/icon-192.png" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: transparent;
        overflow-x: hidden;
        cursor: none;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      /* =========================
         CURSOR
      ========================== */
      #custom-cursor {
        position: fixed;
        width: 10px;
        height: 10px;
        background: #333;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: transform 0.1s ease, background 0.3s ease;
      }

      #custom-cursor.active {
        background: #ff0000;
        transform: translate(-50%, -50%) scale(3);
      }

      /* =========================
         HERO APPLE SYSTEM
      ========================== */

      .hero-journey {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
      }

      .slide {
        position: relative;
        height: 100vh;
        scroll-snap-align: start;
        overflow: hidden;
      }

      .slide img {
        position: absolute;
        width: 110%;
        height: 110%;
        top: -5%;
        left: -5%;
        object-fit: cover;
        transform: scale(1.1);
        will-change: transform;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.45);
      }

      .content {
        position: absolute;
        top: 50%;
        right: 6%;
        transform: translateY(-50%) translateX(60px);
        max-width: 460px;
        color: white;
        opacity: 0;
        transition: all 0.8s ease;
        will-change: transform, opacity;
      }

      .content h2 {
        font-size: 2.4rem;
        letter-spacing: -0.5px;
        margin-bottom: 1rem;
      }

      .content p {
        font-size: 1.05rem;
        line-height: 1.6;
        opacity: 0.9;
      }

      .content.active {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }

      .cta {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 12px 22px;
        background: white;
        color: black;
        font-weight: 600;
        text-decoration: none;
      }

      .cta:hover {
        background: black;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="custom-cursor"></div>

    <script>
      /* =========================
         CURSOR
      ========================== */
      const cursor = document.getElementById("custom-cursor");

      window.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";

        const interactive = e.target.closest(
          "a, button, input, textarea, select, .cursor-pointer"
        );

        cursor.classList.toggle("active", !!interactive);
      });

      /* =========================
         APPLE SCROLL ENGINE
      ========================== */

      const slides = document.querySelectorAll(".slide");

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            const content = entry.target.querySelector(".content");
            const img = entry.target.querySelector("img");

            if (entry.isIntersecting) {
              entry.target.classList.add("active");

              if (content) content.classList.add("active");

              if (img) {
                img.style.transform = "scale(1)";
              }
            } else {
              entry.target.classList.remove("active");

              if (content) content.classList.remove("active");

              if (img) {
                img.style.transform = "scale(1.1)";
              }
            }
          });
        },
        {
          threshold: 0.6
        }
      );

      slides.forEach((s) => observer.observe(s));
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
